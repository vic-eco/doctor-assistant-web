
{% extends 'base.html' %}
{% load static %}
{% block style%}
<link rel="stylesheet" href="{% static 'authentication/css/register.css' %}">
{% endblock%}
{% block title %}Register{% endblock %}
{% block content %}

<h2>Register</h2>
<form action="{% url 'authentication:register' %}" method="post">
	{% csrf_token %}
	{{form.as_p}}
	<button type="submit">Sign Up</button>
</form>

<a href="{% url 'authentication:login' %}">Already have an account? Login</a>

{% endblock %}
