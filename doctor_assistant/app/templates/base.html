{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}App{% endblock %}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
	{% block script %}{% endblock %}
</head>
<style>
   @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap');

	.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 2.5px solid #1a6fff;
    padding: 0 28px;
    height: 58px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.02em;
    text-decoration: none;
  }

  .nav-brand .cross-icon {
    width: 32px;  /* ← change to resize navbar icon */
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-brand .cross-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .nav-actions {
  	display: flex;
  	align-items: center;
  	gap: 12px; /* spacing between buttons */
  }

  .btn-logout, .btn-analytics {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(26,111,255,0.25);
  }

  .btn-logout{
	background: #1a6fff;
    color: #fff;
  }

  .btn-logout:hover {
    background: #0f56d6;
    box-shadow: 0 4px 14px rgba(26,111,255,0.35);
	color: white
  }

  .btn-analytics{
	background: #696c79;
    color: #fff;
  }

  .btn-analytics:hover{
	background: #494f5c;
    box-shadow: 0 4px 14px rgba(26,111,255,0.35);
	color: white
  }

  


</style>
<body>
	<nav class="navbar">
		<a href="{% url 'home' %}" class="nav-brand">
			<div class="cross-icon">
			<img src="{% static 'images/cross-icon.png' %}" alt="DocAssistant logo">
			</div>
			AIDA
		</a>
		<div class="nav-actions">
			<a href="{% url 'analytics:home' %}" class="btn-analytics">Analytics</a>
			<a href="{% url 'authentication:logout' %}" class="btn-logout">Logout</a>
		</div>	
	</nav>
	{% block content %}{% endblock %}
	{% if messages %}
		{% for message in messages %}
			<div class="alert alert-{{ message.tags }}">
				{{ message }}
			</div>
		{% endfor %}
	{% endif %}
</body>
</html>
